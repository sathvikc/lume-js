<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lume-JS Performance Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #333;
      --primary: #3b82f6;
      --text: #e5e5e5;
      --text-muted: #888;
      --accent: #10b981;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      overflow-y: auto;
    }

    .dashboard {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }

    .clock-container {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .clock {
      width: 40px;
      height: 40px;
      border: 3px solid #555;
      border-radius: 50%;
      position: relative;
      background: #222;
    }

    @keyframes spin {
      from { transform: translateX(-50%) rotate(0deg); }
      to   { transform: translateX(-50%) rotate(360deg); }
    }

    .hand {
      width: 3px;
      height: 20px;
      background: var(--primary);
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 3px;
      /* CSS animation runs on the compositor thread — immune to JS main-thread work.
         This is intentional: the clock proves Lume-JS keeps the render pipeline free. */
      animation: spin 2s linear infinite;
    }

    .clock-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      max-width: 150px;
      line-height: 1.2;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .panel h2 {
      margin: 0 0 15px 0;
      font-size: 1rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .radio-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .radio-row label {
      background: var(--bg);
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
    }

    .radio-row input {
      margin-right: 10px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      box-sizing: border-box;
    }

    .stats-display {
      background: #000;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    th,
    td {
      padding: 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    th {
      color: var(--text-muted);
      font-weight: 600;
    }

    td {
      font-family: 'JetBrains Mono', monospace;
    }

    .grid-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .grid-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    #cell-count-display {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid rgba(16, 185, 129, 0.4);
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.2);
      letter-spacing: 0.5px;
    }

    .matrix {
      display: flex;
      flex-wrap: wrap;
      gap: 1px;
      background: #000;
      padding: 1px;
      max-height: 400px;
      overflow-y: auto;
    }

    .cell {
      background: #333;
      flex-grow: 1;
    }
  </style>
  <script type="module">
    import { state, effect } from '../src/index.js?v=7';
    import { batch } from '../src/addons/index.js?v=7';

    // 1. App UI State powered by Lume-JS!
    const ui = state({
      strategy: 'none',
      timeTaken: 0,
      effectExecutions: 0,
      totalOperations: 0,
      statusMessage: '',
      history: {
        'none': { runs: 0, min: Infinity, max: 0, sum: 0 },
        'dedupe-false': { runs: 0, min: Infinity, max: 0, sum: 0 },
        'dedupe-true': { runs: 0, min: Infinity, max: 0, sum: 0 },
        'dedupe-true-slice': { runs: 0, min: Infinity, max: 0, sum: 0 }
      }
    });

    const hand = document.getElementById('hand');
    const input = document.getElementById('heavy-input');
    const storeCountInput = document.getElementById('store-count');
    const timeDisplay = document.getElementById('time-display');
    const matrix = document.getElementById('matrix');
    const cellCountDisplay = document.getElementById('cell-count-display');

    // Clock is driven by CSS animation (compositor thread) — it cannot be blocked by JS.
    // This is the correct architecture for a smooth indicator: never trust RAF for critical UI
    // when heavy JS is running on the main thread.

    // 2. Reactive UI Bindings
    effect(() => {
      // This automatically updates the DOM when `ui` state changes!
      timeDisplay.innerHTML = `
        Strategy: ${ui.strategy}<br>
        Time taken: ${ui.timeTaken.toFixed(2)} ms<br>
        Effect Executions: ${ui.effectExecutions}<br>
        Total Operations: <strong>${ui.totalOperations.toLocaleString()}</strong>
        ${ui.statusMessage ? `<br><span style="color:var(--accent)">${ui.statusMessage}</span>` : ''}
      `;
    });

    effect(() => {
      // This automatically updates the History Table when `ui.history` changes!
      ['none', 'dedupe-false', 'dedupe-true', 'dedupe-true-slice'].forEach(s => {
        const stat = ui.history[s];
        if (stat.runs === 0) {
          document.getElementById(`hist-${s}-low`).innerText = '-';
          document.getElementById(`hist-${s}-avg`).innerText = '-';
          document.getElementById(`hist-${s}-high`).innerText = '-';
        } else {
          document.getElementById(`hist-${s}-low`).innerText = stat.min.toFixed(2);
          document.getElementById(`hist-${s}-avg`).innerText = (stat.sum / stat.runs).toFixed(2);
          document.getElementById(`hist-${s}-high`).innerText = stat.max.toFixed(2);
        }
      });
    });

    effect(() => {
      // Keep Radio Button checked state in sync automatically!
      const radio = document.querySelector(`input[name="strategy"][value="${ui.strategy}"]`);
      if (radio) radio.checked = true;
    });

    // 3. Demo Engine
    let storesData = [];
    let globalEffectRuns = 0;
    let stopMatrixEffect = null;
    let currentStoreCount = 100;
    let isInitializing = false;

    const yieldFrame = () => new Promise(resolve => requestAnimationFrame(resolve));
    const FRAME_BUDGET_MS = 4; // 4ms budget per frame — leaves 12ms for clock + paint

    async function initDemo(count) {
      if (isInitializing) return;
      isInitializing = true;
      currentStoreCount = count;

      // Teardown old effects
      if (stopMatrixEffect) {
        if (Array.isArray(stopMatrixEffect)) stopMatrixEffect.forEach(fn => fn());
        else stopMatrixEffect();
      }
      stopMatrixEffect = null;

      matrix.innerHTML = '';
      globalEffectRuns = 0;

      batch(() => {
        ui.history = {
          'none': { runs: 0, min: Infinity, max: 0, sum: 0 },
          'dedupe-false': { runs: 0, min: Infinity, max: 0, sum: 0 },
          'dedupe-true': { runs: 0, min: Infinity, max: 0, sum: 0 },
          'dedupe-true-slice': { runs: 0, min: Infinity, max: 0, sum: 0 }
        };
        ui.strategy = 'none';
        ui.timeTaken = 0;
        ui.effectExecutions = 0;
        ui.totalOperations = 0;
        ui.statusMessage = 'Initializing...';
      });
      input.value = '';

      // --- Chunked state creation (prevents freeze on large counts) ---
      storesData = [];
      let frameStart = performance.now();
      for (let i = 0; i < count; i++) {
        const rKey = 'v' + Math.random().toString(36).substr(2, 4);
        const obj = { [rKey]: 0 };
        for (let j = 0; j < 10; j++) obj['dummy_' + j] = Math.random();
        storesData.push({ store: state(obj), key: rKey });
        if ((performance.now() - frameStart) >= FRAME_BUDGET_MS) {
          await yieldFrame();
          frameStart = performance.now();
        }
      }

      // --- Build DOM cells ---
      const visibleCount = Math.min(count, 2000);
      const cellWidth = Math.max(12, Math.floor(800 / (visibleCount / 5)));
      const frag = document.createDocumentFragment();
      for (let i = 0; i < visibleCount; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.id = `cell-${i}`;
        cell.style.minWidth = `${cellWidth}px`;
        cell.style.height = `${cellWidth}px`;
        frag.appendChild(cell);
      }
      matrix.appendChild(frag);

      cellCountDisplay.innerText = count > 2000
        ? `${count.toLocaleString()} Stores • ${(count * 11).toLocaleString()} Total Keys (2k visible nodes)`
        : `${count.toLocaleString()} Active Cells • ${(count * 11).toLocaleString()} Total Keys`;

      // --- Chunked effect creation ---
      stopMatrixEffect = [];
      const storesPerCell = Math.ceil(count / visibleCount);
      frameStart = performance.now();
      for (let i = 0; i < visibleCount; i++) {
        const cell = document.getElementById(`cell-${i}`);
        const si = i;
        stopMatrixEffect.push(effect(() => {
          const startIdx = si * storesPerCell;
          const endIdx = Math.min(count, startIdx + storesPerCell);
          let sum = 0;
          for (let j = startIdx; j < endIdx; j++) sum += storesData[j].store[storesData[j].key];
          globalEffectRuns++;
          if (cell) cell.style.background = `hsl(${(sum * 37) % 360},70%,40%)`;
        }));
        if ((performance.now() - frameStart) >= FRAME_BUDGET_MS) {
          await yieldFrame();
          frameStart = performance.now();
        }
      }

      ui.statusMessage = '';
      isInitializing = false;
    }

    initDemo(100);

    // Debounced: don't call initDemo on every keystroke (typing "100000" = 6 calls)
    let initDebounceTimer = null;
    storeCountInput.addEventListener('input', (e) => {
      clearTimeout(initDebounceTimer);
      initDebounceTimer = setTimeout(() => {
        let val = parseInt(e.target.value);
        if (isNaN(val) || val < 1) return;
        if (val > 100000) { val = 100000; e.target.value = val; }
        initDemo(val);
      }, 400);
    });

    document.querySelectorAll('input[name="strategy"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        input.value = '';
        batch(() => {
          ui.strategy = e.target.value;
          ui.timeTaken = 0;
          ui.effectExecutions = 0;
          ui.totalOperations = 0;
        });
      });
    });

    let isProcessing = false;
    input.addEventListener('input', async (e) => {
      if (isProcessing) return;
      
      const strategy = document.querySelector('input[name="strategy"]:checked').value;
      
      if (strategy !== 'dedupe-true' && strategy !== 'dedupe-true-slice' && currentStoreCount > 10000) {
        ui.statusMessage = '<span style="color:red">ERROR: Modes capped at 10k stores to prevent crashing. Switch to dedupe: true!</span>';
        return;
      }

      isProcessing = true;
      const start = performance.now();
      const startRuns = globalEffectRuns;
      const totalOps = currentStoreCount;

      if (strategy === 'none') {
        for (let s = 0; s < currentStoreCount; s++) storesData[s].store[storesData[s].key]++;
      } else if (strategy === 'dedupe-false') {
        batch(() => {
          for (let s = 0; s < currentStoreCount; s++) storesData[s].store[storesData[s].key]++;
        }, { dedupe: false });
      } else if (strategy === 'dedupe-true') {
        batch(() => {
          for (let s = 0; s < currentStoreCount; s++) storesData[s].store[storesData[s].key]++;
        }, { dedupe: true });
      } else if (strategy === 'dedupe-true-slice') {
        ui.statusMessage = "Rendering in background... (watch the clock — it never stops!)";
        await yieldFrame();

        // THE KEY INSIGHT: mutate inside sequential small batch() calls.
        // Each batch() call:
        //   1. Suppresses microtask effects during mutation (preventing thread-blocking cascades)
        //   2. timeSlice: true drains only THAT chunk's effects in RAF-aligned slices
        //   3. We await it, then yield to RAF, then process the next chunk
        // This means both data mutation AND effect rendering are RAF-synced.
        const STORES_PER_CHUNK = Math.max(1000, Math.ceil(currentStoreCount / 20)); // ~20 chunks
        for (let s = 0; s < currentStoreCount; s += STORES_PER_CHUNK) {
          const end = Math.min(currentStoreCount, s + STORES_PER_CHUNK);
          await batch(() => {
            for (let i = s; i < end; i++) storesData[i].store[storesData[i].key]++;
          }, { dedupe: true, timeSlice: true, timeBudget: FRAME_BUDGET_MS });
        }
      }

      if (strategy !== 'dedupe-true-slice') await Promise.resolve();

      const end = performance.now();
      const duration = parseFloat((end - start).toFixed(2));
      const runs = globalEffectRuns - startRuns;

      // Clone history object to trigger Lume-JS top-level reactivity
      const newHistory = {
        'none': { ...ui.history['none'] },
        'dedupe-false': { ...ui.history['dedupe-false'] },
        'dedupe-true': { ...ui.history['dedupe-true'] },
        'dedupe-true-slice': { ...ui.history['dedupe-true-slice'] }
      };
      
      const stat = newHistory[strategy];
      stat.runs++;
      stat.sum += duration;
      if (duration < stat.min) stat.min = duration;
      if (duration > stat.max) stat.max = duration;

      // Update all UI state cleanly using Lume-JS batching!
      batch(() => {
        ui.timeTaken = duration;
        ui.effectExecutions = runs;
        ui.totalOperations += totalOps;
        ui.history = newHistory;
        ui.statusMessage = ''; // clear status
      });
      isProcessing = false;
    });
  </script>
</head>

<body>
  <div class="dashboard">
    <div class="header">
      <h1>Lume-JS Architecture Demo</h1>
      <div class="clock-container">
        <div class="clock"><div class="hand" id="hand"></div></div>
        <div class="clock-label">If the JS thread blocks,<br>this clock stutters.</div>
      </div>
    </div>

    <div class="main-grid">
      <!-- Controls Panel -->
      <div class="panel">
        <h2>Controls</h2>
        
        <div class="form-group">
          <label>Grid Size (Store Count)</label>
          <input type="number" id="store-count" value="100" min="1" max="100000" step="100" />
        </div>

        <div class="form-group">
          <label>Batching Strategy</label>
          <div class="radio-row">
            <label><input type="radio" name="strategy" value="none" checked> Default (Microtasks) - Jittery!</label>
            <label><input type="radio" name="strategy" value="dedupe-false"> Batch (dedupe: false) - Jittery!</label>
            <label><input type="radio" name="strategy" value="dedupe-true"> Batch (dedupe: true) - <strong style="color:var(--accent);margin-left:4px;">Smooth!</strong></label>
            <label><input type="radio" name="strategy" value="dedupe-true-slice"> Concurrent (dedupe + timeSlice) - <strong style="color:var(--accent);margin-left:4px;">Zero Jitter 60FPS!</strong></label>
          </div>
        </div>

        <div class="form-group">
          <label>Trigger Rapid State Mutations</label>
          <input type="text" id="heavy-input" placeholder="Type here..." autocomplete="off" />
        </div>
      </div>

      <!-- Stats Panel -->
      <div class="panel">
        <h2>Performance</h2>
        
        <div class="stats-display" id="time-display">
          Strategy: none<br>
          Time taken: 0.00 ms<br>
          Effect Executions: 0<br>
          Total Operations: 0
        </div>

        <table>
          <thead>
            <tr>
              <th>Mode</th>
              <th>Low (ms)</th>
              <th>Avg (ms)</th>
              <th>High (ms)</th>
            </tr>
          </thead>
          <tbody id="history-body">
            <tr><td>Default</td><td id="hist-none-low">-</td><td id="hist-none-avg">-</td><td id="hist-none-high">-</td></tr>
            <tr><td>dedupe: false</td><td id="hist-dedupe-false-low">-</td><td id="hist-dedupe-false-avg">-</td><td id="hist-dedupe-false-high">-</td></tr>
            <tr><td>dedupe: true</td><td id="hist-dedupe-true-low">-</td><td id="hist-dedupe-true-avg">-</td><td id="hist-dedupe-true-high">-</td></tr>
            <tr><td>dedupe + timeSlice</td><td id="hist-dedupe-true-slice-low">-</td><td id="hist-dedupe-true-slice-avg">-</td><td id="hist-dedupe-true-slice-high">-</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Grid Panel -->
    <div class="grid-container">
      <div class="grid-header">
        <span>Render Matrix</span>
        <span id="cell-count-display">100 Cells</span>
      </div>
      <div class="matrix" id="matrix"></div>
    </div>
  </div>
</body>
</html>
