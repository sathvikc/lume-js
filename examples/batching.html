<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lume-JS Performance Demo</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      padding: 2rem;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .container {
      display: flex;
      gap: 40px;
      width: 100%;
      max-width: 900px;
    }

    .controls {
      flex: 1;
      background: #222;
      padding: 20px;
      border-radius: 8px;
    }

    .animation {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .clock {
      width: 200px;
      height: 200px;
      border: 4px solid #fff;
      border-radius: 50%;
      position: relative;
      background: #333;
    }

    .hand {
      width: 4px;
      height: 90px;
      background: #007bff;
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      transform: translateX(-50%) rotate(0deg);
    }

    select,
    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 20px;
      background: #333;
      color: white;
      border: 1px solid #555;
      border-radius: 4px;
    }

    .stats {
      background: #000;
      padding: 15px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 14px;
      color: #0f0;
    }

    /* Small decorative grid to cause layout recalculations */
    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 2px;
      margin-top: 20px;
      width: 100%;
    }

    .cell {
      width: 100%;
      aspect-ratio: 1;
      background: #444;
      transition: background 0.1s;
    }
  </style>
  <script type="module">
    import { state, effect } from '../src/index.js';
    import { batch } from '../src/addons/index.js';

    // UI Elements
    const hand = document.getElementById('hand');
    const input = document.getElementById('heavy-input');
    const strategySelect = document.getElementById('strategy');
    const timeDisplay = document.getElementById('time-display');
    const gridContainer = document.getElementById('grid');

    // 1. Independent Animation Loop (using rAF)
    // This clock spins continuously. If the main thread is blocked by heavy DOM updates
    // or JS execution from our input, this clock will visibly stutter.
    let angle = 0;
    let lastTime = performance.now();
    function animate(time) {
      const delta = time - lastTime;
      lastTime = time;

      // Rotate 90 degrees per second
      angle = (angle + (90 * (delta / 1000))) % 360;
      hand.style.transform = `translateX(-50%) rotate(${angle}deg)`;

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    // 2. Setup Heavy Workload
    // Create 100 independent stores.
    const NUM_STORES = 100;
    const stores = Array.from({ length: NUM_STORES }, () => state({ value: 0 }));

    // Create DOM cells mapped to stores to force render updates
    for (let i = 0; i < NUM_STORES; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${i}`;
      gridContainer.appendChild(cell);
    }

    // Effect that reads ALL stores. 
    // This is computationally heavy because it registers 100 dependencies.
    let globalEffectRuns = 0;
    effect(() => {
      let sum = 0;
      for (let i = 0; i < NUM_STORES; i++) {
        sum += stores[i].value;
      }
      globalEffectRuns++;

      // Force a heavy layout update across all 100 grid cells
      const r = (sum % 255);
      for (let i = 0; i < NUM_STORES; i++) {
        const cell = document.getElementById(`cell-${i}`);
        // Offset the color slightly for each cell to create a pattern
        if (cell) cell.style.background = `rgb(${(r + i * 2) % 255}, 50, 100)`;
      }
    });

    // 3. The Input Event Handler
    // Whenever you type a letter, we mutate ALL 100 stores 100 times.
    // This simulates typing triggering a huge cascade of complex reactive updates.
    input.addEventListener('input', async (e) => {
      const strategy = strategySelect.value;
      const NUM_UPDATES = 100;

      const start = performance.now();
      const startRuns = globalEffectRuns;

      if (strategy === 'none') {
        // Microtasks queue
        for (let i = 0; i < NUM_UPDATES; i++) {
          for (let s = 0; s < NUM_STORES; s++) {
            stores[s].value++;
          }
        }
      } else if (strategy === 'dedupe-false') {
        // Batch without dedupe
        batch(() => {
          for (let i = 0; i < NUM_UPDATES; i++) {
            for (let s = 0; s < NUM_STORES; s++) {
              stores[s].value++;
            }
          }
        }, { dedupe: false });
      } else if (strategy === 'dedupe-true') {
        // Batch with dedupe
        batch(() => {
          for (let i = 0; i < NUM_UPDATES; i++) {
            for (let s = 0; s < NUM_STORES; s++) {
              stores[s].value++;
            }
          }
        }, { dedupe: true });
      }

      // We wait for a microtask to ensure 'none' strategy completes its async flush
      await Promise.resolve();

      const end = performance.now();
      const duration = (end - start).toFixed(2);
      const runs = globalEffectRuns - startRuns;

      timeDisplay.innerText = `Strategy: ${strategy}\nTime taken: ${duration} ms\nEffect Executions: ${runs}`;
    });
  </script>
</head>

<body>
  <div class="header">
    <h1>Lume-JS Animation & Jitter Demo</h1>
    <p>Type continuously in the input box. Watch the spinning clock. If the strategy is slow, the clock will jitter and
      freeze.</p>
  </div>

  <div class="container">
    <div class="controls">
      <label for="strategy"><b>Select Batching Strategy:</b></label>
      <select id="strategy">
        <option value="none">1. Default (Microtasks) - Jittery!</option>
        <option value="dedupe-false">2. Batch (dedupe: false) - Silky Smooth!</option>
        <option value="dedupe-true">3. Batch (dedupe: true) - Moderate Jitter</option>
      </select>

      <label for="heavy-input"><b>Type fast to trigger updates:</b></label>
      <input type="text" id="heavy-input" placeholder="Start typing... dfgjkhdfg" autocomplete="off" />

      <div class="stats" id="time-display">
        Strategy: none<br>
        Time taken: 0.00 ms<br>
        Effect Executions: 0
      </div>

      <div class="grid" id="grid"></div>
    </div>

    <div class="animation">
      <div class="clock">
        <div class="hand" id="hand"></div>
      </div>
      <p style="margin-top: 20px; color: #888;">If the JS thread blocks,<br>this clock will freeze.</p>
    </div>
  </div>
</body>

</html>
