name: Size Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  size:
    name: Bundle Size
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and measure PR sizes
        id: pr
        run: |
          npm run build 2>&1
          node scripts/check-size.js --json > pr-size.json 2>&1 || true
          cat pr-size.json
          PASSED=$(node -e "const d=require('./pr-size.json'); console.log(d.passed)")
          echo "passed=$PASSED" >> $GITHUB_OUTPUT

      - name: Checkout base branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base-branch

      - name: Build and measure base sizes
        if: github.event_name == 'pull_request'
        run: |
          cd base-branch
          npm ci
          npm run build 2>&1
          node scripts/check-size.js --json > ../base-size.json 2>&1 || true

      - name: Post size comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const pr = JSON.parse(fs.readFileSync('pr-size.json', 'utf8'));
            let base = null;
            if (fs.existsSync('base-size.json')) {
              try { base = JSON.parse(fs.readFileSync('base-size.json', 'utf8')); } catch (e) { /* old script format, no baseline */ }
            }

            const baseMap = {};
            if (base) base.files.forEach(f => { baseMap[f.file] = f; });

            const fmt  = (b) => (b / 1024).toFixed(2) + ' KB';
            const diff = (a, b) => {
              const d = a - b;
              const sign = d > 0 ? '+' : '';
              return `${sign}${(d / 1024).toFixed(2)} KB`;
            };
            const arrow = (a, b) => a > b ? '📈' : a < b ? '📉' : '➡️';

            const status = pr.passed ? '✅ Passed' : '❌ Failed';
            let body = `## 📦 Bundle Size — ${status}\n\n`;

            const npmFiles = pr.files.filter(f => f.budget != null);
            const cdnFiles = pr.files.filter(f => f.budget == null);

            body += `**npm entry points** (imported via \`lume-js\`, \`lume-js/addons\`, \`lume-js/handlers\`)\n\n`;
            body += `| File | Gzipped | Budget | Change | Status |\n`;
            body += `|------|---------|--------|--------|--------|\n`;
            for (const f of npmFiles) {
              const statusStr = f.overBudget
                ? `❌ over by ${fmt(f.gzipped - f.budget)}`
                : `✅ ${((f.gzipped / f.budget) * 100).toFixed(0)}%`;
              const baseF = baseMap[f.file];
              const changeStr = baseF ? `${arrow(f.gzipped, baseF.gzipped)} ${diff(f.gzipped, baseF.gzipped)}` : '—';
              body += `| \`${f.file}\` | **${fmt(f.gzipped)}** | ${fmt(f.budget)} | ${changeStr} | ${statusStr} |\n`;
            }

            if (cdnFiles.length > 0) {
              body += `\n**CDN standalone builds** (self-contained, no shared chunks)\n\n`;
              body += `| File | Gzipped | Change |\n`;
              body += `|------|---------|--------|\n`;
              for (const f of cdnFiles) {
                const baseF = baseMap[f.file];
                const changeStr = baseF ? `${arrow(f.gzipped, baseF.gzipped)} ${diff(f.gzipped, baseF.gzipped)}` : '—';
                body += `| \`${f.file}\` | **${fmt(f.gzipped)}** | ${changeStr} |\n`;
              }
            }

            body += '\n';
            if (pr.passed) {
              body += '✅ All npm entry points within budget.';
            } else {
              body += '❌ **One or more bundles exceed their size budget.** Review recent changes to core/addons/handlers.';
            }

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Bundle Size')
            );

            const payload = { owner: context.repo.owner, repo: context.repo.repo, body };
            if (existing) {
              await github.rest.issues.updateComment({ ...payload, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...payload, issue_number: context.issue.number });
            }

      - name: Write step summary
        run: node scripts/check-size.js 2>&1 >> $GITHUB_STEP_SUMMARY || true

      - name: Fail if over budget
        run: |
          PASSED=$(node -e "const d=require('./pr-size.json'); console.log(d.passed)")
          if [ "$PASSED" != "true" ]; then exit 1; fi
