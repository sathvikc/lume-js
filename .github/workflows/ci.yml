name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Tests & Coverage ────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        env:
          NO_COLOR: 1
        run: npm run coverage 2>&1 | tee coverage-output.txt

      - name: Save results
        if: always()
        run: |
          COUNT=$(grep -oP 'Tests\s+\K\d+(?= passed)' coverage-output.txt || echo "?")
          FILES=$(grep -oP 'Test Files\s+\K\d+(?= passed)' coverage-output.txt || echo "?")
          echo "{\"count\":\"$COUNT\",\"files\":\"$FILES\"}" > test-meta.json
          cp coverage/coverage-summary.json coverage-summary.json 2>/dev/null || true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-coverage
          path: |
            test-meta.json
            coverage-summary.json

      - name: Fail if coverage dropped
        run: |
          if grep -q "ERROR: Coverage" coverage-output.txt; then
            echo "❌ Coverage thresholds not met"
            exit 1
          fi

  # ── Cognitive Complexity (ESLint) ───────────────────────────────────────────
  lint:
    name: Cognitive Complexity (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --format json > eslint-report.json 2>&1 || true

      - name: Upload lint artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-lint
          path: eslint-report.json

      - name: Fail if violations found
        run: |
          PASS=$(node -e "const r=require('./eslint-report.json'); console.log(r.reduce((n,f)=>n+f.errorCount,0)===0?'true':'false')")
          if [ "$PASS" != "true" ]; then exit 1; fi

  # ── Complexity & Maintainability ────────────────────────────────────────────
  complexity:
    name: Complexity & Maintainability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run complexity analysis
        run: node scripts/complexity.js --json > complexity.json 2>&1 || true

      - name: Checkout base branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base-branch

      - name: Install base dependencies
        if: github.event_name == 'pull_request'
        run: cd base-branch && npm ci

      - name: Run complexity on base
        if: github.event_name == 'pull_request'
        run: node base-branch/scripts/complexity.js --json > complexity-base.json 2>&1 || true

      - name: Upload complexity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-complexity
          path: |
            complexity.json
            complexity-base.json

      - name: Write step summary
        run: node scripts/complexity.js 2>&1 >> $GITHUB_STEP_SUMMARY || true

      - name: Fail if over budget
        run: |
          PASS=$(node -e "const d=require('./complexity.json'); console.log(d.passed)")
          if [ "$PASS" != "true" ]; then exit 1; fi

  # ── Bundle Size ─────────────────────────────────────────────────────────────
  size:
    name: Bundle Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and measure PR sizes
        run: |
          npm run build
          node scripts/check-size.js --json > pr-size.json 2>&1 || true

      - name: Checkout base branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base-branch

      - name: Build and measure base sizes
        if: github.event_name == 'pull_request'
        run: |
          (cd base-branch && npm ci && npm run build)
          node base-branch/scripts/check-size.js --json > base-size.json 2>&1 || true

      - name: Upload size artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-size
          path: |
            pr-size.json
            base-size.json

      - name: Write step summary
        run: node scripts/check-size.js 2>&1 >> $GITHUB_STEP_SUMMARY || true

      - name: Fail if over budget
        run: |
          PASS=$(node -e "const d=require('./pr-size.json'); console.log(d.passed)")
          if [ "$PASS" != "true" ]; then exit 1; fi

  # ── TypeScript ──────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

  agent-docs:
    name: Agent Docs Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Check llms.txt / llms-full.txt are regenerated
        run: node scripts/build-llms.js --check

  # ── Unified PR Report ───────────────────────────────────────────────────────
  report:
    name: PR Report
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs: [test, lint, complexity, size, typecheck, agent-docs]
    permissions:
      pull-requests: write
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ci-coverage
          path: ci-coverage

      - name: Download lint artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ci-lint
          path: ci-lint

      - name: Download complexity artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ci-complexity
          path: ci-complexity

      - name: Download size artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ci-size
          path: ci-size

      - name: Post unified PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const results = {
              test:       '${{ needs.test.result }}',
              lint:       '${{ needs.lint.result }}',
              complexity: '${{ needs.complexity.result }}',
              size:       '${{ needs.size.result }}',
              typecheck:  '${{ needs.typecheck.result }}',
              agentDocs:  '${{ needs.agent-docs.result }}',
            };

            const ok    = r => r === 'success';
            const icon  = r => ok(r) ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            const allOk = Object.values(results).every(ok);

            let body = `## ${allOk ? '✅' : '❌'} PR Quality Report\n\n`;

            // ── Tests & Coverage ───────────────────────────────────────────
            body += `### ${icon(results.test)} Tests & Coverage\n\n`;
            if (fs.existsSync('ci-coverage/test-meta.json') && fs.existsSync('ci-coverage/coverage-summary.json')) {
              const meta = JSON.parse(fs.readFileSync('ci-coverage/test-meta.json', 'utf8'));
              const cov  = JSON.parse(fs.readFileSync('ci-coverage/coverage-summary.json', 'utf8')).total;
              const pct  = p => `${parseFloat(p) >= 100 ? '✅' : '❌'} ${p}%`;
              body += `**${meta.count} tests** across **${meta.files} files**\n\n`;
              body += `| Metric | Coverage | Required |\n`;
              body += `|--------|----------|----------|\n`;
              body += `| Statements | ${pct(cov.statements.pct)} | 100% |\n`;
              body += `| Branches   | ${pct(cov.branches.pct)} | 100% |\n`;
              body += `| Functions  | ${pct(cov.functions.pct)} | 100% |\n`;
              body += `| Lines      | ${pct(cov.lines.pct)} | 100% |\n`;
            } else {
              body += ok(results.test) ? '✅ All tests passed.' : '❌ Tests failed — see job logs for details.';
            }
            body += '\n\n';

            // ── Bundle Size ────────────────────────────────────────────────
            body += `### ${icon(results.size)} Bundle Size\n\n`;
            if (fs.existsSync('ci-size/pr-size.json')) {
              const pr  = JSON.parse(fs.readFileSync('ci-size/pr-size.json', 'utf8'));
              let base  = null;
              if (fs.existsSync('ci-size/base-size.json')) {
                try { base = JSON.parse(fs.readFileSync('ci-size/base-size.json', 'utf8')); } catch (e) {}
              }
              const baseMap = {};
              if (base) base.files.forEach(f => { baseMap[f.file] = f; });

              const fmt    = b => (b / 1024).toFixed(2) + ' KB';
              const change = (pr, base) => {
                const d   = pr - base;
                const pct = base > 0 ? ((d / base) * 100).toFixed(1) : '0.0';
                const sign = d > 0 ? '+' : '';
                const arrow = d > 0 ? '📈' : d < 0 ? '📉' : '➡️';
                return `${arrow} ${sign}${(d / 1024).toFixed(2)} KB (${sign}${pct}%)`;
              };

              const FILE_ORDER = [
                'index.min.mjs', 'addons.min.mjs', 'handlers.min.mjs', 'lume.global.js',
                'index.mjs',     'addons.mjs',     'handlers.mjs',
              ];
              const sortFiles = files => [...files].sort((a, b) => {
                const ai = FILE_ORDER.indexOf(a.file);
                const bi = FILE_ORDER.indexOf(b.file);
                return (ai < 0 ? 999 : ai) - (bi < 0 ? 999 : bi);
              });

              const budgeted = sortFiles(pr.files.filter(f => f.budget != null));
              const splits   = sortFiles(pr.files.filter(f => f.budget == null));

              body += `**CDN standalone builds** — budgeted (self-contained)\n\n`;
              body += `| File | Main | PR | Change | Budget | Status |\n`;
              body += `|------|------|----|--------|--------|--------|\n`;
              for (const f of budgeted) {
                const bf   = baseMap[f.file];
                const main = bf ? fmt(bf.gzipped) : '—';
                const ch   = bf ? change(f.gzipped, bf.gzipped) : '—';
                const st   = f.overBudget ? '❌' : '✅';
                body += `| \`${f.file}\` | ${main} | **${fmt(f.gzipped)}** | ${ch} | ${fmt(f.budget)} | ${st} |\n`;
              }

              if (splits.length > 0) {
                body += `\n**npm split builds** — reference only (share a common chunk, not self-contained)\n\n`;
                body += `| File | Main | PR | Change |\n`;
                body += `|------|------|----|--------|\n`;
                for (const f of splits) {
                  const bf   = baseMap[f.file];
                  const main = bf ? fmt(bf.gzipped) : '—';
                  const ch   = bf ? change(f.gzipped, bf.gzipped) : '—';
                  body += `| \`${f.file}\` | ${main} | **${fmt(f.gzipped)}** | ${ch} |\n`;
                }
              }
            } else {
              body += ok(results.size) ? '✅ Size check passed.' : '❌ Size check failed — see job logs for details.';
            }
            body += '\n\n';

            // ── Cognitive Complexity (ESLint) ──────────────────────────────
            body += `### ${icon(results.lint)} Cognitive Complexity (ESLint)\n\n`;
            if (fs.existsSync('ci-lint/eslint-report.json')) {
              const report = JSON.parse(fs.readFileSync('ci-lint/eslint-report.json', 'utf8'));
              const violations = report.flatMap(f =>
                f.messages
                  .filter(m => m.severity === 2)
                  .map(m => ({ file: f.filePath.replace(process.cwd() + '/', ''), line: m.line, message: m.message }))
              );
              if (violations.length === 0) {
                body += 'All functions within cognitive complexity threshold of 15.\n';
              } else {
                body += `${violations.length} violation(s) found:\n\n`;
                body += '| File | Line | Issue |\n|------|------|-------|\n';
                for (const v of violations) {
                  body += `| \`${v.file}\` | ${v.line} | ${v.message} |\n`;
                }
              }
            } else {
              body += ok(results.lint) ? '✅ Passed.' : '❌ Failed — see job logs for details.';
            }
            body += '\n\n';

            // ── Complexity & Maintainability ───────────────────────────────
            body += `### ${icon(results.complexity)} Complexity & Maintainability\n\n`;
            if (fs.existsSync('ci-complexity/complexity.json')) {
              const data = JSON.parse(fs.readFileSync('ci-complexity/complexity.json', 'utf8'));
              let baseData = null;
              if (fs.existsSync('ci-complexity/complexity-base.json')) {
                try { baseData = JSON.parse(fs.readFileSync('ci-complexity/complexity-base.json', 'utf8')); } catch (e) {}
              }
              const baseFileMap = {};
              if (baseData) baseData.files.forEach(f => { baseFileMap[f.file] = f; });

              const grade = g => g === 'A' ? '🟢 A' : g === 'B' ? '🟡 B' : '🔴 C';
              const d = (val, base, decimals = 0) => {
                if (base == null) return decimals > 0 ? val.toFixed(decimals) : String(val);
                const diff = val - base;
                if (diff === 0) return decimals > 0 ? val.toFixed(decimals) : String(val);
                const sign = diff > 0 ? '+' : '';
                const diffStr = decimals > 0 ? diff.toFixed(decimals) : String(diff);
                const valStr  = decimals > 0 ? val.toFixed(decimals) : String(val);
                return `${valStr} (${sign}${diffStr})`;
              };

              body += `| File | LOC | Funcs | Max CC | Avg CC | MI | Grade | Status |\n`;
              body += `|------|-----|-------|--------|--------|----|-------|--------|\n`;
              for (const f of data.files) {
                const bf = baseFileMap[f.file];
                const st = f.overBudget ? '❌' : (f.exemptions?.length || f.miExempt) ? '⚠️ known' : '✅';
                body += `| \`${f.file}\` | ${d(f.loc, bf?.loc)} | ${d(f.funcs, bf?.funcs)} | ${d(f.maxCC, bf?.maxCC)} | ${d(f.avgCC, bf?.avgCC, 1)} | ${d(f.mi, bf?.mi)} | ${grade(f.grade)} | ${st} |\n`;
                for (const v of (f.violations || [])) {
                  body += `| ↳ \`${v.name}\` (line ${v.line}) | | | **${v.cc}** | | | | ❌ CC>${data.thresholds.maxCC} |\n`;
                }
                for (const v of (f.exemptions || [])) {
                  body += `| ↳ \`${v.name}\` (line ${v.line}) | | | ${v.cc} | | | | ⚠️ exempt |\n`;
                }
              }
              body += data.passed
                ? '\n✅ No new complexity violations.'
                : '\n❌ New complexity violations detected. Refactor or add to `KNOWN_EXCEPTIONS` with justification.';
              body += `\n\n<sub>MI scale: 🟢 A ≥ 65 · 🟡 B 40–64 · 🔴 C < 40 · Thresholds: max CC ≤ ${data.thresholds.maxCC}, MI ≥ ${data.thresholds.minMI}</sub>`;
            } else {
              body += ok(results.complexity) ? '✅ Passed.' : '❌ Failed — see job logs for details.';
            }
            body += '\n\n';

            // ── TypeScript ─────────────────────────────────────────────────
            body += `### ${icon(results.typecheck)} TypeScript\n\n`;
            body += ok(results.typecheck) ? 'No type errors found.' : '❌ Type errors found — see job logs for details.';
            body += '\n\n';

            // ── Agent Docs Freshness ───────────────────────────────────────
            body += `### ${icon(results.agentDocs)} Agent Docs Freshness\n\n`;
            body += ok(results.agentDocs)
              ? 'llms.txt / llms-full.txt match the docs tree.'
              : '❌ Stale agent docs — run `npm run llms` and commit the result.';
            body += '\n';

            // ── Post / update comment ──────────────────────────────────────
            const MARKER = '<!-- lume-ci-report -->';
            body = MARKER + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(MARKER));

            const payload = { owner: context.repo.owner, repo: context.repo.repo, body };
            if (existing) {
              await github.rest.issues.updateComment({ ...payload, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...payload, issue_number: context.issue.number });
            }
