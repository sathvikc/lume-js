name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: coverage
        run: |
          npm run coverage -- --reporter=json --reporter=json-summary 2>&1 | tee coverage-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Parse coverage summary
        if: github.event_name == 'pull_request'
        id: parse
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            STMTS=$(node -e "const c=require('./coverage/coverage-summary.json').total; console.log(c.statements.pct)")
            BRANCH=$(node -e "const c=require('./coverage/coverage-summary.json').total; console.log(c.branches.pct)")
            FUNCS=$(node -e "const c=require('./coverage/coverage-summary.json').total; console.log(c.functions.pct)")
            LINES=$(node -e "const c=require('./coverage/coverage-summary.json').total; console.log(c.lines.pct)")
            echo "statements=$STMTS" >> $GITHUB_OUTPUT
            echo "branches=$BRANCH" >> $GITHUB_OUTPUT
            echo "functions=$FUNCS" >> $GITHUB_OUTPUT
            echo "lines=$LINES" >> $GITHUB_OUTPUT
          fi

      - name: Count tests
        if: github.event_name == 'pull_request'
        id: tests
        run: |
          COUNT=$(grep -oP 'Tests\s+\K\d+(?= passed)' coverage-output.txt || echo "?")
          FILES=$(grep -oP 'Test Files\s+\K\d+(?= passed)' coverage-output.txt || echo "?")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const stmts    = '${{ steps.parse.outputs.statements }}';
            const branches = '${{ steps.parse.outputs.branches }}';
            const funcs    = '${{ steps.parse.outputs.functions }}';
            const lines    = '${{ steps.parse.outputs.lines }}';
            const count    = '${{ steps.tests.outputs.count }}';
            const files    = '${{ steps.tests.outputs.files }}';

            const icon = (pct) => parseFloat(pct) >= 100 ? '✅' : '❌';
            const all100 = [stmts, branches, funcs, lines].every(p => parseFloat(p) >= 100);

            let body = `## ${all100 ? '✅' : '❌'} Test Coverage\n\n`;
            body += `**${count} tests** across **${files} files**\n\n`;
            body += `| Metric | Coverage | Required |\n`;
            body += `|--------|----------|----------|\n`;
            body += `| Statements | ${icon(stmts)} ${stmts}% | 100% |\n`;
            body += `| Branches   | ${icon(branches)} ${branches}% | 100% |\n`;
            body += `| Functions  | ${icon(funcs)} ${funcs}% | 100% |\n`;
            body += `| Lines      | ${icon(lines)} ${lines}% | 100% |\n`;

            if (!all100) {
              body += `\n⚠️ **Coverage must be 100% across all metrics.** Add tests for any new code.`;
            } else {
              body += `\n🎉 Full coverage maintained.`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Test Coverage')
            );

            const payload = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };

            if (existing) {
              await github.rest.issues.updateComment({ ...payload, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...payload, issue_number: context.issue.number });
            }

      - name: Fail if coverage dropped below 100%
        run: |
          if grep -q "ERROR: Coverage" coverage-output.txt; then
            echo "❌ Coverage thresholds not met"
            exit 1
          fi

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

  lint:
    name: Cognitive Complexity (ESLint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (cognitive complexity)
        id: lint
        run: |
          npx eslint src/ --format json > eslint-report.json 2>&1 || true
          PASS=$(node -e "
            const r = require('./eslint-report.json');
            const errors = r.reduce((n, f) => n + f.errorCount, 0);
            console.log(errors === 0 ? 'true' : 'false');
          ")
          echo "passed=$PASS" >> $GITHUB_OUTPUT

      - name: Post lint comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('eslint-report.json', 'utf8'));

            const violations = report.flatMap(f =>
              f.messages
                .filter(m => m.severity === 2)
                .map(m => ({ file: f.filePath.replace(process.cwd() + '/', ''), line: m.line, message: m.message }))
            );

            const passed = violations.length === 0;
            const status = passed ? '✅ Passed' : '❌ Failed';
            let body = `## 🧠 Cognitive Complexity — ${status}\n\n`;

            if (passed) {
              body += 'All functions within cognitive complexity threshold of 15.';
            } else {
              body += `${violations.length} violation(s) found:\n\n`;
              body += '| File | Line | Issue |\n|------|------|-------|\n';
              for (const v of violations) {
                body += `| \`${v.file}\` | ${v.line} | ${v.message} |\n`;
              }
              body += '\n**To fix:** Refactor the function, or add `// eslint-disable-next-line sonarjs/cognitive-complexity -- <reason>` if it is intentionally complex (e.g. a core algorithm).';
            }

            body += '\n\n<sub>Cognitive Complexity counts nesting penalties — nested loops/conditions score higher than flat ones. Threshold: 15 per function.</sub>';

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Cognitive Complexity')
            );

            const payload = { owner: context.repo.owner, repo: context.repo.repo, body };
            if (existing) {
              await github.rest.issues.updateComment({ ...payload, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...payload, issue_number: context.issue.number });
            }

      - name: Fail if violations found
        run: |
          PASS=$(node -e "
            const r = require('./eslint-report.json');
            console.log(r.reduce((n,f) => n + f.errorCount, 0) === 0 ? 'true' : 'false');
          ")
          if [ "$PASS" != "true" ]; then exit 1; fi

  complexity:
    name: Complexity & Maintainability
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run complexity analysis
        id: cx
        run: |
          node scripts/complexity.js --json > complexity.json 2>&1 || true
          cat complexity.json
          PASSED=$(node -e "const d=require('./complexity.json'); console.log(d.passed)")
          echo "passed=$PASSED" >> $GITHUB_OUTPUT

      - name: Post complexity comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('complexity.json', 'utf8'));

            const grade = (g) => g === 'A' ? '🟢 A' : g === 'B' ? '🟡 B' : '🔴 C';
            const status = data.passed ? '✅ Passed' : '❌ Failed';

            let body = `## 🧠 Complexity & Maintainability — ${status}\n\n`;
            body += `| File | LOC | Funcs | Max CC | Avg CC | MI | Grade | Status |\n`;
            body += `|------|-----|-------|--------|--------|----|-------|--------|\n`;

            for (const f of data.files) {
              const st = f.overBudget ? '❌'
                : (f.exemptions?.length || f.miExempt) ? '⚠︎ known'
                : '✅';
              body += `| \`${f.file}\` | ${f.loc} | ${f.funcs} | ${f.maxCC} | ${f.avgCC} | ${f.mi} | ${grade(f.grade)} | ${st} |\n`;
              for (const v of (f.violations || [])) {
                body += `| ↳ \`${v.name}\` (line ${v.line}) | | | **${v.cc}** | | | | ❌ CC>${data.thresholds.maxCC} |\n`;
              }
              for (const v of (f.exemptions || [])) {
                body += `| ↳ \`${v.name}\` (line ${v.line}) | | | ${v.cc} | | | | ⚠︎ exempt |\n`;
              }
            }

            body += '\n';
            body += data.passed
              ? '✅ No new complexity violations.'
              : '❌ **New complexity violations detected.** Refactor or add to `KNOWN_EXCEPTIONS` with justification.';

            body += `\n\n<sub>MI scale: 🟢 A ≥ 65 · 🟡 B 40–64 · 🔴 C < 40 · Thresholds: max CC ≤ ${data.thresholds.maxCC}, MI ≥ ${data.thresholds.minMI}</sub>`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Complexity & Maintainability')
            );

            const payload = { owner: context.repo.owner, repo: context.repo.repo, body };
            if (existing) {
              await github.rest.issues.updateComment({ ...payload, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...payload, issue_number: context.issue.number });
            }

      - name: Write step summary
        run: node scripts/complexity.js 2>&1 >> $GITHUB_STEP_SUMMARY || true

      - name: Fail if over budget
        run: |
          PASSED=$(node -e "const d=require('./complexity.json'); console.log(d.passed)")
          if [ "$PASSED" != "true" ]; then exit 1; fi
